# Tells Quarto this folder is a website project
project:
  type: website
  output-dir: docs

website:
  title: "Your Name"

  # This controls the navbar at the top of every page
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: publications.qmd
        text: Publications
      - href: blog.qmd
        text: Blog

  # This controls the footer shown at the bottom of every page
  page-footer:
    left: "© 2026 Your Name"
    right: "Built with [Quarto](https://quarto.org)"

# Applies to every page rendered by this project
format:
  html:
    theme: cyborg # pick any built-in theme: https://quarto.org/docs/output-formats/html-themes.html
    css: styles.css    # our own small stylesheet for tweaks
